<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<!--
  Shared font-rendering tweaks for both stirling-pdf and stirling-unoserver
  containers. Improves headless LibreOffice / Chromium output by enabling
  subpixel hinting, slight hint style, antialiasing, and an LCD filter.

  Drop this file at /etc/fonts/conf.d/100-stirling.conf so it sorts after
  /etc/fonts/conf.d/<lower>-*.conf defaults but before any 9*-* overrides.

  Inspired by gotenberg's build/fonts.conf (which credits arachnys/athenapdf).
-->
<fontconfig>
  <match target="font">
    <edit mode="assign" name="rgba">
      <const>rgb</const>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="hinting">
      <bool>true</bool>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="hintstyle">
      <const>hintslight</const>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="antialias">
      <bool>true</bool>
    </edit>
  </match>
  <match target="font">
    <edit mode="assign" name="lcdfilter">
      <const>lcddefault</const>
    </edit>
  </match>
</fontconfig>
